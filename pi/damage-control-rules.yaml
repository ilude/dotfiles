# Pi-native damage-control rules port the intent of the Claude hooks for Pi's
# extension runtime. See .specs/pi-damage-control-v2/claude-parity-matrix.md
# for current limits and the future shared policy schema follow-up.
astAnalysis:
  enabled: true
  timeoutMs: 50
  safeCommands:
    - ls
    - echo
    - cat
    - grep
    - head
    - tail
    - wc
    - date
    - pwd
    - whoami
    - "git status"
    - "git log"
    - "git diff"
    - "git branch"
  dangerousCommands:
    - rm
    - mv
    - dd
    - mkfs
    - chmod
    - chown
    - kill
    - pkill
    - shutdown
    - reboot

dangerous_commands:
  - pattern: "rm recursive force"
    regex: "\\brm\\s+(?:-[A-Za-z]*r[A-Za-z]*f[A-Za-z]*|-[A-Za-z]*f[A-Za-z]*r[A-Za-z]*|--recursive\\s+--force|--force\\s+--recursive)\\b"
    reason: "Recursive force delete can cause irreversible data loss"
  - pattern: "rm force"
    regex: "\\brm\\s+(?=[^|;&]*?(?:-[A-Za-z]*f[A-Za-z]*|--force)\\b)(?![^|;&]*?(?:-[A-Za-z]*r[A-Za-z]*|--recursive)\\b)"
    reason: "Force delete bypasses normal interactive safeguards and can remove files irreversibly"
    action: "ask"
  - pattern: "git reset hard"
    regex: "\\bgit\\s+reset\\s+--hard\\b"
    reason: "Discards uncommitted changes permanently"
  - pattern: "git push force"
    regex: "\\bgit\\s+push\\b.*(?:--force\\b|-f\\b)"
    reason: "Force push can overwrite upstream history shared with others"
  - pattern: "DROP TABLE"
    reason: "Drops a database table and all its data"
  - pattern: "DROP DATABASE"
    reason: "Drops an entire database irreversibly"
  - pattern: "git clean force"
    regex: "\\bgit\\s+clean\\b.*(?:--force\\b|-[A-Za-z]*f[A-Za-z]*)"
    reason: "Removes untracked files without recovery"
  - pattern: "shell wrapper destructive command"
    regex: "\\b(?:bash|sh)\\s+-c\\s+['\"]?[^'\"]*(?:rm\\s+-[A-Za-z]*r[A-Za-z]*f|git\\s+reset\\s+--hard|git\\s+clean\\b.*-[A-Za-z]*f)"
    reason: "Shell wrapper hides a destructive command that can cause data loss"
  - pattern: "interpreter wrapper destructive command"
    regex: "\\b(?:python\\s+-c|node\\s+-e)\\s+['\"]?[^'\"]*(?:rm\\s+-[A-Za-z]*r[A-Za-z]*f|unlink|rmdir|rmSync)"
    reason: "Interpreter wrapper hides a destructive file operation"
  - pattern: "secret file read"
    regex: "\\b(?:cat|sed|awk|head|tail|base64)\\b[^|;&]*(?:\\.env(?!\\.(?:example|template|sample|j2))\\b|~/\\.ssh/|id_(?:ed25519|rsa)|\\.(?:pem|key)\\b)"
    reason: "Reads secret-bearing files that must not be exposed"
  - pattern: "interpreter secret file read"
    regex: "\\b(?:python\\s+-c|node\\s+-e)\\s+['\"]?[^'\"]*(?:\\.env(?!\\.(?:example|template|sample|j2))\\b|~/\\.ssh/|id_(?:ed25519|rsa)|\\.(?:pem|key)\\b)"
    reason: "Interpreter wrapper can read and expose secret-bearing files"
  - pattern: "cloud metadata credential read"
    regex: "169\\.254\\.169\\.254|metadata\\.google\\.internal"
    reason: "Cloud instance metadata endpoints may expose credentials"
  - pattern: "secret to network pipeline"
    regex: "(?:\\.env\\b|~/\\.ssh/|id_(?:ed25519|rsa)|\\.(?:pem|key)\\b).*(?:\\||;|&&).*(?:curl|wget|nc|ncat)\\b|(?:curl|wget|nc|ncat)\\b.*(?:@-|--data|--data-binary|--upload-file)"
    reason: "Potential exfiltration of local secrets to a network sink"
  - pattern: "chmod 777"
    reason: "Grants world-readable/writable/executable permissions — security risk"
  - pattern: "pwsh recursive force delete"
    tools: ["pwsh"]
    regex: "\\b(?:Remove-Item|rm|ri|del|erase|rmdir|rd)\\b(?=[^|;&]*-(?:Recurse|r|rec))(?=[^|;&]*-(?:Force|f|fo))"
    reason: "PowerShell recursive force delete can cause irreversible data loss"
  - pattern: "pwsh encoded command"
    tools: ["pwsh"]
    regex: "\\b(?:powershell|pwsh)(?:\\.exe)?\\b[^|;&]*-(?:EncodedCommand|enc|e)\\b"
    reason: "Encoded PowerShell commands hide behavior and are commonly used for bypass/obfuscation"
  - pattern: "pwsh execution policy bypass"
    tools: ["pwsh"]
    regex: "\\b(?:powershell|pwsh)(?:\\.exe)?\\b[^|;&]*-(?:ExecutionPolicy|ep|ex)\\s+(?:Bypass|Unrestricted)|\\bSet-ExecutionPolicy\\b[^|;&]*(?:Bypass|Unrestricted)"
    reason: "Execution policy bypass weakens PowerShell script safety controls"
  - pattern: "pwsh download execute"
    tools: ["pwsh"]
    regex: "\\b(?:Invoke-WebRequest|iwr|wget|curl|Invoke-RestMethod|irm)\\b[^|;&]*(?:\\||;)\\s*(?:Invoke-Expression|iex|powershell|pwsh|Start-Process)"
    reason: "Download-and-execute patterns can run untrusted remote code"
  - pattern: "pwsh invoke expression"
    tools: ["pwsh"]
    regex: "\\b(?:Invoke-Expression|iex)\\b"
    reason: "Invoke-Expression executes dynamically constructed code"
  - pattern: "pwsh defender weakening"
    tools: ["pwsh"]
    regex: "\\b(?:Set-MpPreference|Add-MpPreference)\\b[^|;&]*(?:DisableRealtimeMonitoring|DisableBehaviorMonitoring|DisableIOAVProtection|ExclusionPath|ExclusionProcess|ExclusionExtension)"
    reason: "Weakens Microsoft Defender or adds malware-style exclusions"
  # Linux only: on Windows/macOS these are allowed; on Linux they require confirmation.
  - pattern: "docker compose down"
    reason: "docker compose down stops and removes containers"
    action: "ask"
    platforms: ["linux"]
  - pattern: "docker down"
    reason: "docker down stops and removes containers"
    action: "ask"
    platforms: ["linux"]

zero_access_paths:
  - "~/.ssh/*"
  - "*.pem"
  - "*.key"
  - ".env"
  - "*credentials*"
  - "*secret*"

zero_access_exclusions:
  - ".env.example"
  - "*.env.example"
  - "*.env.template"
  - "*.env.sample"
  - "*.env.j2"

no_delete_paths:
  - "package.json"
  - "Cargo.toml"
  - "pyproject.toml"
  - "Makefile"

domain_constraints:
  # placeholder - populated by agent persona files
  note: "Domain constraints are loaded from individual agent persona files by agent-team extension"
