# Pi-owned damage-control policy.
astAnalysis:
  enabled: true
  timeoutMs: 50
  safeCommands:
    - "ls"
    - "echo"
    - "cat"
    - "grep"
    - "head"
    - "tail"
    - "wc"
    - "date"
    - "pwd"
    - "whoami"
    - "git status"
    - "git log"
    - "git diff"
    - "git branch"
  dangerousCommands:
    - "rm"
    - "mv"
    - "dd"
    - "mkfs"
    - "chmod"
    - "chown"
    - "kill"
    - "pkill"
    - "shutdown"
    - "reboot"
dangerous_commands:
  - pattern: "\\bgit\\s+rm\\s+(?!.*--cached).*\\S"
    regex: "\\bgit\\s+rm\\s+(?!.*--cached).*\\S"
    reason: "git rm (deletes files from working tree and index). Use --cached to only remove from index."
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\brm\\s+.*-[rR].*\\s+~(/\\*?)?(\\s*$|\\s+[;&|])"
    regex: "\\brm\\s+.*-[rR].*\\s+~(/\\*?)?(\\s*$|\\s+[;&|])"
    reason: "rm recursive on home directory (~) - CATASTROPHIC"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\brm\\s+.*-[rR].*\\s+\\$\\{?HOME\\}?(/\\*?)?(\\s*$|\\s+[;&|])"
    regex: "\\brm\\s+.*-[rR].*\\s+\\$\\{?HOME\\}?(/\\*?)?(\\s*$|\\s+[;&|])"
    reason: "rm recursive on $HOME - CATASTROPHIC"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\brm\\s+.*-[rR].*\\s+/\\*?(\\s*$|\\s+[;&|])"
    regex: "\\brm\\s+.*-[rR].*\\s+/\\*?(\\s*$|\\s+[;&|])"
    reason: "rm recursive on root (/) - CATASTROPHIC"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\brm\\s+.*-[rR].*\\s+/mnt/c/[Uu]sers(/[^/\\s]*)?(/\\*?)?(\\s*$|\\s+[;&|])"
    regex: "\\brm\\s+.*-[rR].*\\s+/mnt/c/[Uu]sers(/[^/\\s]*)?(/\\*?)?(\\s*$|\\s+[;&|])"
    reason: "rm recursive on Windows home via WSL (/mnt/c/Users) - CATASTROPHIC"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\brm\\s+.*-[rR].*\\s+/c/[Uu]sers(/[^/\\s]*)?(/\\*?)?(\\s*$|\\s+[;&|])"
    regex: "\\brm\\s+.*-[rR].*\\s+/c/[Uu]sers(/[^/\\s]*)?(/\\*?)?(\\s*$|\\s+[;&|])"
    reason: "rm recursive on Windows home via Git Bash (/c/Users) - CATASTROPHIC"
    action: "block"
    tools:
      - "bash"
  - pattern: "(?<!git\\s)(?<!docker\\s)\\brm\\s+(-[^\\s]*)*-[rRf]"
    regex: "(?<!git\\s)(?<!docker\\s)\\brm\\s+(-[^\\s]*)*-[rRf]"
    reason: "rm with recursive or force flags"
    action: "ask"
    tools:
      - "bash"
  - pattern: "(?<!git\\s)(?<!docker\\s)\\brm\\s+-[rRf]"
    regex: "(?<!git\\s)(?<!docker\\s)\\brm\\s+-[rRf]"
    reason: "rm with recursive or force flags"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\brm\\s+.*\\bCLAUDE\\.md\\b"
    regex: "\\brm\\s+.*\\bCLAUDE\\.md\\b"
    reason: "CLAUDE.md is a critical Claude Code configuration file"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\brm\\s+.*\\bAGENTS?\\.md\\b"
    regex: "\\brm\\s+.*\\bAGENTS?\\.md\\b"
    reason: "AGENT.md/AGENTS.md are critical Claude Code configuration files"
    action: "block"
    tools:
      - "bash"
  - pattern: "(?<!-)\\brm\\s+[^-\\s]"
    regex: "(?<!-)\\brm\\s+[^-\\s]"
    reason: "rm deletes files permanently"
    action: "ask"
    tools:
      - "bash"
  - pattern: "(?<!docker\\s)\\brm\\s+--recursive"
    regex: "(?<!docker\\s)\\brm\\s+--recursive"
    reason: "rm with --recursive flag"
    action: "ask"
    tools:
      - "bash"
  - pattern: "(?<!docker\\s)\\brm\\s+--force"
    regex: "(?<!docker\\s)\\brm\\s+--force"
    reason: "rm with --force flag"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bsudo\\s+rm\\b"
    regex: "\\bsudo\\s+rm\\b"
    reason: "sudo rm"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\brmdir\\s+--ignore-fail-on-non-empty"
    regex: "\\brmdir\\s+--ignore-fail-on-non-empty"
    reason: "rmdir ignore-fail"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bchmod\\s+(-[^\\s]+\\s+)*777\\b"
    regex: "\\bchmod\\s+(-[^\\s]+\\s+)*777\\b"
    reason: "chmod 777 (world writable)"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bchmod\\s+-[Rr].*777"
    regex: "\\bchmod\\s+-[Rr].*777"
    reason: "recursive chmod 777"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bchown\\s+-[Rr].*\\broot\\b"
    regex: "\\bchown\\s+-[Rr].*\\broot\\b"
    reason: "recursive chown to root"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+reset\\s+--hard\\b"
    regex: "\\bgit\\s+reset\\s+--hard\\b"
    reason: "git reset --hard (use --soft or stash)"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+clean\\s+(-[^\\s]*)*-[fd]"
    regex: "\\bgit\\s+clean\\s+(-[^\\s]*)*-[fd]"
    reason: "git clean with force/directory flags"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+push\\s+.*--force(?!-with-lease)"
    regex: "\\bgit\\s+push\\s+.*--force(?!-with-lease)"
    reason: "git push --force (use --force-with-lease for safer alternative)"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+push\\s+(-[^\\s]*)*-f\\b"
    regex: "\\bgit\\s+push\\s+(-[^\\s]*)*-f\\b"
    reason: "git push -f (use --force-with-lease for safer alternative)"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+push\\s+.*--force-with-lease"
    regex: "\\bgit\\s+push\\s+.*--force-with-lease"
    reason: "git push --force-with-lease (rewrites remote history, but with safety check)"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+stash\\s+clear\\b"
    regex: "\\bgit\\s+stash\\s+clear\\b"
    reason: "git stash clear (deletes ALL stashes)"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+reflog\\s+expire\\b"
    regex: "\\bgit\\s+reflog\\s+expire\\b"
    reason: "git reflog expire (destroys recovery mechanism)"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+gc\\s+.*--prune=now"
    regex: "\\bgit\\s+gc\\s+.*--prune=now"
    reason: "git gc --prune=now (can lose dangling commits)"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+filter-branch\\b"
    regex: "\\bgit\\s+filter-branch\\b"
    reason: "git filter-branch (rewrites entire history)"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+checkout\\s+--\\s*\\."
    regex: "\\bgit\\s+checkout\\s+--\\s*\\."
    reason: "Discards all uncommitted changes. Use 'git stash' first"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+checkout\\s+\\S+\\s+--\\s+\\S"
    regex: "\\bgit\\s+checkout\\s+\\S+\\s+--\\s+\\S"
    reason: "Overwrites working tree with ref version. Use 'git stash' first"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+checkout\\s+.*--pathspec-from-file"
    regex: "\\bgit\\s+checkout\\s+.*--pathspec-from-file"
    reason: "Can overwrite multiple files. Use 'git stash' first"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+restore\\s+(?!.*--staged)[^\\n]*$"
    regex: "\\bgit\\s+restore\\s+(?!.*--staged)[^\\n]*$"
    reason: "Discards uncommitted changes. Use 'git stash' first or --staged to only unstage"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+restore\\s+.*--worktree"
    regex: "\\bgit\\s+restore\\s+.*--worktree"
    reason: "Explicitly discards working tree changes. Use 'git stash' first"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+reset\\s+--merge"
    regex: "\\bgit\\s+reset\\s+--merge"
    reason: "Can lose uncommitted changes. Use 'git stash' first"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+stash\\s+drop\\b"
    regex: "\\bgit\\s+stash\\s+drop\\b"
    reason: "Permanently deletes a stash. Consider 'git stash list' first"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+branch\\s+(-[^\\s]*)*-D"
    regex: "\\bgit\\s+branch\\s+(-[^\\s]*)*-D"
    reason: "Force deletes branch without merge check. Use -d for safe delete"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+worktree\\s+remove\\s+.*--force"
    regex: "\\bgit\\s+worktree\\s+remove\\s+.*--force"
    reason: "Can delete uncommitted changes. Remove --force flag"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+worktree\\s+remove\\s+.*-f\\b"
    regex: "\\bgit\\s+worktree\\s+remove\\s+.*-f\\b"
    reason: "Can delete uncommitted changes. Remove -f flag"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+push\\s+\\S+\\s+--delete\\b"
    regex: "\\bgit\\s+push\\s+\\S+\\s+--delete\\b"
    reason: "Deletes remote branch"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bgit\\s+push\\s+\\S+\\s+:\\S+"
    regex: "\\bgit\\s+push\\s+\\S+\\s+:\\S+"
    reason: "Deletes remote branch (old syntax)"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bmkfs\\."
    regex: "\\bmkfs\\."
    reason: "filesystem format command"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bdd\\s+.*of=/dev/"
    regex: "\\bdd\\s+.*of=/dev/"
    reason: "dd writing to device"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bkill\\s+-9\\s+-1\\b"
    regex: "\\bkill\\s+-9\\s+-1\\b"
    reason: "kill all processes"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bkillall\\s+-9\\b"
    regex: "\\bkillall\\s+-9\\b"
    reason: "killall -9"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bpkill\\s+-9\\b"
    regex: "\\bpkill\\s+-9\\b"
    reason: "pkill -9"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bhistory\\s+-c\\b"
    regex: "\\bhistory\\s+-c\\b"
    reason: "clearing shell history"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bcrontab\\b"
    regex: "\\bcrontab\\b"
    reason: "crontab modifies scheduled tasks (persistence mechanism)"
    action: "ask"
    tools:
      - "bash"
  - pattern: "(?:^|[;&|]\\s*|&&\\s*|\\|\\|\\s*)(?:sudo\\s+)?at\\s+[-0-9A-Za-z+]"
    regex: "(?:^|[;&|]\\s*|&&\\s*|\\|\\|\\s*)(?:sudo\\s+)?at\\s+[-0-9A-Za-z+]"
    reason: "at command schedules future execution (persistence mechanism)"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bschtasks\\b"
    regex: "\\bschtasks\\b"
    reason: "schtasks creates/modifies Windows scheduled tasks (persistence)"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bsystemd-run\\b"
    regex: "\\bsystemd-run\\b"
    reason: "systemd-run creates transient service units (persistence)"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\blaunchctl\\s+(load|submit|bootstrap)\\b"
    regex: "\\blaunchctl\\s+(load|submit|bootstrap)\\b"
    reason: "launchctl loads launch agents/daemons (macOS persistence)"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\b(New|Register|Set)-ScheduledTask\\b"
    regex: "\\b(New|Register|Set)-ScheduledTask\\b"
    reason: "PowerShell scheduled task cmdlet (Windows persistence)"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bfind\\s+[^|;]*-delete\\b"
    regex: "\\bfind\\s+[^|;]*-delete\\b"
    reason: "find -delete permanently removes files. Use -print first to preview"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bfind\\s+.*-exec\\s+rm\\s+-[rRf]"
    regex: "\\bfind\\s+.*-exec\\s+rm\\s+-[rRf]"
    reason: "find -exec rm -rf can delete entire directory trees"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bfind\\s+.*-exec\\s+rm\\b"
    regex: "\\bfind\\s+.*-exec\\s+rm\\b"
    reason: "find -exec rm removes matched files"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bfind\\s+.*-execdir\\s+rm\\s+-[rRf]"
    regex: "\\bfind\\s+.*-execdir\\s+rm\\s+-[rRf]"
    reason: "find -execdir rm -rf can delete entire directory trees"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bfind\\s+.*-execdir\\s+rm\\b"
    regex: "\\bfind\\s+.*-execdir\\s+rm\\b"
    reason: "find -execdir rm removes matched files"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bTMPDIR=[\"']?[\"']?\\s"
    regex: "\\bTMPDIR=[\"']?[\"']?\\s"
    reason: "Empty TMPDIR is dangerous - $TMPDIR/foo expands to /foo"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bTMPDIR=['\"]?(/home|/root|/etc|/usr|/var(?!/tmp)|/opt|/mnt|/media|~)"
    regex: "\\bTMPDIR=['\"]?(/home|/root|/etc|/usr|/var(?!/tmp)|/opt|/mnt|/media|~)"
    reason: "TMPDIR redirected to non-temp path enables path traversal attacks"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bTMPDIR=['\"]?[Cc]:[/\\\\](Windows|Users|Program)"
    regex: "\\bTMPDIR=['\"]?[Cc]:[/\\\\](Windows|Users|Program)"
    reason: "TMPDIR redirected to Windows system path - dangerous"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bLD_PRELOAD\\s*="
    regex: "\\bLD_PRELOAD\\s*="
    reason: "LD_PRELOAD hijacks dynamic linker to inject shared libraries"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bDYLD_INSERT_LIBRARIES\\s*="
    regex: "\\bDYLD_INSERT_LIBRARIES\\s*="
    reason: "DYLD_INSERT_LIBRARIES injects libraries on macOS (same as LD_PRELOAD)"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bLD_LIBRARY_PATH\\s*="
    regex: "\\bLD_LIBRARY_PATH\\s*="
    reason: "LD_LIBRARY_PATH override may redirect library loading to attacker-controlled paths"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bnode\\s+(-e|--eval)\\s+['\"].*\\b(fs\\.rm|fs\\.unlink|child_process|exec|spawn)\\b"
    regex: "\\bnode\\s+(-e|--eval)\\s+['\"].*\\b(fs\\.rm|fs\\.unlink|child_process|exec|spawn)\\b"
    reason: "Node.js one-liner with potentially dangerous operation"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bruby\\s+-e\\s+['\"].*\\b(FileUtils\\.rm|File\\.delete|system|exec|`)\\b"
    regex: "\\bruby\\s+-e\\s+['\"].*\\b(FileUtils\\.rm|File\\.delete|system|exec|`)\\b"
    reason: "Ruby one-liner with potentially dangerous operation"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bperl\\s+-e\\s+['\"].*\\b(unlink|rmdir|system|exec|`)\\b"
    regex: "\\bperl\\s+-e\\s+['\"].*\\b(unlink|rmdir|system|exec|`)\\b"
    reason: "Perl one-liner with potentially dangerous operation"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bxargs\\s+.*\\b(bash|sh|zsh|ksh|dash|csh|tcsh|fish)\\s+-c\\b"
    regex: "\\bxargs\\s+.*\\b(bash|sh|zsh|ksh|dash|csh|tcsh|fish)\\s+-c\\b"
    reason: "xargs with shell -c can execute arbitrary commands from dynamic input"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bxargs\\s+.*\\brm\\s+.*-[rRf]"
    regex: "\\bxargs\\s+.*\\brm\\s+.*-[rRf]"
    reason: "xargs rm -rf with dynamic input can delete many files unexpectedly"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bxargs\\s+.*\\brm\\b"
    regex: "\\bxargs\\s+.*\\brm\\b"
    reason: "xargs piping to rm can delete many files"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bxargs\\s+.*\\bfind\\s+.*-delete\\b"
    regex: "\\bxargs\\s+.*\\bfind\\s+.*-delete\\b"
    reason: "xargs with find -delete can delete files from dynamic input"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bxargs\\s+.*\\bgit\\s+(push\\s+--force|reset\\s+--hard|clean\\s+-f)"
    regex: "\\bxargs\\s+.*\\bgit\\s+(push\\s+--force|reset\\s+--hard|clean\\s+-f)"
    reason: "xargs with destructive git commands amplifies damage"
    action: "block"
    tools:
      - "bash"
  - pattern: "\\bparallel\\s+.*\\brm\\s+-[rRf]"
    regex: "\\bparallel\\s+.*\\brm\\s+-[rRf]"
    reason: "parallel piping to rm -rf can delete many files"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\bparallel\\s+.*\\b(bash|sh|zsh)\\s+-c\\b"
    regex: "\\bparallel\\s+.*\\b(bash|sh|zsh)\\s+-c\\b"
    reason: "parallel with shell execution can run arbitrary commands"
    action: "ask"
    tools:
      - "bash"
  - pattern: "\\baws\\s+s3\\s+rm\\s+.*--recursive"
    regex: "\\baws\\s+s3\\s+rm\\s+.*--recursive"
    reason: "aws s3 rm --recursive (deletes all objects)"
