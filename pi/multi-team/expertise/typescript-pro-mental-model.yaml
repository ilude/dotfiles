    notes:
      - before_provider_request payloads are load-order-sensitive and passed through as mutable values; logging must deep-clone and avoid in-place redaction.
      - mock-pi helper tests do not emulate ExtensionRunner/AgentSession ordering, tool_result chaining, or session replacement semantics.
      - subagent tracing is special because pi/extensions/subagent/index.ts spawns a separate pi process, so parent hooks cannot see child internals unless they are forwarded explicitly.
