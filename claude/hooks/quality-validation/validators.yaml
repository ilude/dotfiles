# Quality Validation Configuration
# Add a language by adding a block. No code changes needed.
# Install commands use platform detection: winget (Windows), brew (macOS), apt (Debian/Ubuntu)

python:
  extensions: [".py"]
  markers: ["pyproject.toml", "setup.py", "requirements.txt"]
  validators:
    - name: ruff-check
      command: ["ruff", "check", "{file}"]
      check: "ruff"
    - name: ruff-format
      command: ["ruff", "format", "--check", "{file}"]
      check: "ruff"
  install:
    winget: null
    brew: null
    apt: null
    pip: "uv tool install ruff"

typescript:
  extensions: [".ts", ".tsx"]
  markers: ["package.json", "tsconfig.json"]
  # detect: pick first validator whose config files exist in project root.
  # Falls back to the last entry if none match.
  validators:
    - name: eslint-flat
      command: ["{project_root}/node_modules/.bin/eslint.exe", "{file}"]
      detect: ["eslint.config.js", "eslint.config.mjs", "eslint.config.cjs", "eslint.config.ts", "eslint.config.mts"]
    - name: eslint-legacy
      command: ["{project_root}/node_modules/.bin/eslint.exe", "--config", "{project_root}/.eslintrc.json", "{file}"]
      env:
        ESLINT_USE_FLAT_CONFIG: "false"
      detect: [".eslintrc", ".eslintrc.js", ".eslintrc.json", ".eslintrc.yml", ".eslintrc.yaml", ".eslintrc.cjs"]
    - name: biome
      command: ["biome", "check", "{file}"]
      check: "biome"
      detect: ["biome.json", "biome.jsonc"]

javascript:
  extensions: [".js", ".jsx"]
  markers: ["package.json"]
  validators:
    - name: biome
      command: ["biome", "check", "{file}"]
      check: "biome"
      detect: ["biome.json", "biome.jsonc"]

shell:
  extensions: [".sh", ".bash"]
  markers: ["Makefile", ".shellcheckrc"]
  validators:
    - name: shellcheck
      command: ["shellcheck", "{file}"]
      check: "shellcheck"
  install:
    winget: "winget install koalaman.shellcheck"
    brew: "brew install shellcheck"
    apt: "sudo apt install shellcheck"

go:
  extensions: [".go"]
  markers: ["go.mod"]
  validators:
    - name: go-vet
      command: ["go", "vet", "{file}"]
      check: "go"
  install:
    winget: "winget install GoLang.Go"
    brew: "brew install go"
    apt: "sudo apt install golang-go"
