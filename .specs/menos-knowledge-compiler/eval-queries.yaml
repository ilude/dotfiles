  - id: dotfiles-004
    category: dotfiles
    text: "How does the quality-validation hook find project root across menos submodules?"

  - id: dotfiles-005
    category: dotfiles
    text: "What's the timeout pattern for PreToolUse (5s) vs PostToolUse (15s) hooks and why?"

  # cross-project workflow patterns
  - id: workflow-001
    category: workflow
    text: "When do I reach for a builder agent vs doing a task myself?"

  - id: workflow-002
    category: workflow
    text: "What's my pattern for handling git submodule changes that span both the submodule and the parent repo?"

  - id: workflow-003
    category: workflow
    text: "How do I structure a new Claude Code hook from scratch — what files, what order?"

  - id: workflow-004
    category: workflow
    text: "What's my typical lint + test command sequence for menos vs dotfiles?"

  - id: workflow-005
    category: workflow
    text: "When do I use plan-with-team vs do-it vs doing work directly?"

  # recent decisions (expected to live in session_logs once capture is running)
  - id: decisions-001
    category: decisions
    text: "Why did I choose APScheduler over Ansible cron for the menos knowledge compiler?"

  - id: decisions-002
