# Eval harness query set for menos-knowledge-compiler.
#
# These queries are the baseline for measuring retrieval quality across plan
# changes. The harness runs each query against menos, records the top-10 results
# (content_id, title, score, snippet) as a deterministic snapshot, and compares
# future runs to detect regression.
#
# No hand-labeled ground truth is required — regression is measured as:
#   - Result set overlap between runs (Jaccard@5, Jaccard@10)
#   - Score drift per query (delta in top-1 similarity)
#   - Ordering stability (Kendall tau on top-5)
#
# Categories:
#   menos-arch:   menos architecture / API (answers live in code + docs)
#   dotfiles:     dotfiles / hooks (answers live in CLAUDE.md + hook code)
#   workflow:     cross-project workflow patterns (answers live in session_logs)
#   decisions:    recent decisions (answers live in session_logs + specs)
#   gotchas:      debugging / bugs (answers live in session_logs + commits)

queries:
  # menos architecture / API
  - id: menos-001
    category: menos-arch
    text: "How does pipeline_job resource_key dedup work, and what's the format for a YouTube video key?"

  - id: menos-002
    category: menos-arch
    text: "What's the RFC 9421 signing flow for menos API calls — which key does the client use?"

  - id: menos-003
    category: menos-arch
    text: "Where does LinkExtractor run in the menos request path, and why doesn't storage.py call it?"

  - id: menos-004
    category: menos-arch
    text: "What's the _run_purge retention policy for pipeline_job records?"

  - id: menos-005
    category: menos-arch
    text: "How does the UnifiedPipelineService produce tier and quality_score on a content item?"

  # dotfiles / hooks
  - id: dotfiles-001
    category: dotfiles
