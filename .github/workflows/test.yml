name: Shell Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Init submodules
        run: git submodule update --init dotbot

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Install zsh (Windows)
        if: runner.os == 'Windows'
        id: msys2
        uses: msys2/setup-msys2@v2.32.0
        with:
          install: zsh

      - name: Export zsh executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zsh = Join-Path '${{ steps.msys2.outputs.msys2-location }}' 'usr\bin\zsh.exe'
          "ZSH_EXECUTABLE=$zsh" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Bootstrap CI contract
        shell: bash
        run: scripts/ci-bootstrap base

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck zsh

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core shellcheck

      - name: Verify zsh dependency
        shell: bash
        run: '"${ZSH_EXECUTABLE:-zsh}" --version'

      - name: Run checks (Linux/macOS)
        if: runner.os != 'Windows'
        run: make check-ci

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: uv run pytest test/ claude/hooks/*/tests/ -v --tb=short

  pi-vitest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap Pi CI contract
        run: scripts/ci-bootstrap pi

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install pi-coding-agent
        run: >
          pnpm install -g
          @earendil-works/pi-coding-agent@0.80.3
          @earendil-works/pi-agent-core@0.80.3
          @earendil-works/pi-ai@0.80.3
          @earendil-works/pi-tui@0.80.3
          @sinclair/typebox@0.34.49

      - name: Run Pi Vitest suite
        run: make check-pi-ci
