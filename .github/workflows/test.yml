name: Shell Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Init submodules
        run: git submodule update --init dotbot

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core shellcheck

      - name: Run checks (Linux/macOS)
        if: runner.os != 'Windows'
        run: make lint test

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: uv run pytest test/ claude/hooks/*/tests/ -v --tb=short

  pi-vitest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install pi-coding-agent
        run: pnpm install -g @mariozechner/pi-coding-agent

      - name: Install Pi test dependencies
        run: cd pi/tests && bun install --frozen-lockfile

      - name: Run Pi Vitest suite
        run: cd pi/tests && bun vitest run

      # Windows is skipped: bun on Windows runners is not yet stable enough
      # for the global pnpm + pi-coding-agent install sequence.
